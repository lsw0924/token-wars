<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이템 교환 비율</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="exchange-page">
        <div class="exchange-container">
            <div class="exchange-header">
                <p class="exchange-tag">Token Wars</p>
                <h1 class="exchange-title">증표 교환 정보</h1>
                <p class="exchange-subtitle">다음 아이템들로 증표를 얻을 수 있습니다.</p>
            </div>

            <div class="exchange-grid">
                <div class="exchange-group exchange-group-full">
                    <h2 class="exchange-group-title">광질</h2>
                    <div class="exchange-group-grid">
                        <div class="exchange-card"><span>철</span><strong>30 → 1</strong></div>
                        <div class="exchange-card"><span>에메랄드</span><strong>20 → 1</strong></div>
                        <div class="exchange-card"><span>다이아</span><strong>6 → 1</strong></div>
                        <div class="exchange-card"><span>금</span><strong>20 → 1</strong></div>
                        <div class="exchange-card"><span>네더라이트</span><strong>1 → 4</strong></div>
                        <div class="exchange-card"><span>청금석 & 레드스톡</span><strong>64 → 1</strong></div>
                        <div class="exchange-card"><span>석영</span><strong>128 → 1</strong></div>
                    </div>
                </div>

                <div class="exchange-group exchange-group-full">
                    <h2 class="exchange-group-title">농사</h2>
                    <div class="exchange-group-grid">
                        <div class="exchange-card"><span>감자</span><strong>768 → 1</strong></div>
                        <div class="exchange-card"><span>네더와트</span><strong>768 → 1</strong></div>
                        <div class="exchange-card"><span>독감자</span><strong>15 → 1</strong></div>
                        <div class="exchange-card"><span>갓애플</span><strong>1 → 1</strong></div>
                    </div>
                </div>

                <div class="exchange-group exchange-group-full">
                    <h2 class="exchange-group-title">구조물</h2>
                    <div class="exchange-group-grid">
                        <div class="exchange-card"><span>네더의 별</span><strong>1 → 7</strong></div>
                        <div class="exchange-card"><span>무거운 코어</span><strong>1 → 5</strong></div>
                    </div>
                </div>

                <div class="exchange-group exchange-group-full">
                    <h2 class="exchange-group-title">드랍템</h2>
                    <div class="exchange-group-grid">
                        <div class="exchange-card"><span>드래곤알</span><strong>→ 50</strong></div>
                        <div class="exchange-card"><span>삼지창</span><strong>→ 3</strong></div>
                    </div>
                </div>
            </div>

            <a href="rules.html" class="back-link">돌아가기</a>
        </div>
    </div>
</body>
</html>
